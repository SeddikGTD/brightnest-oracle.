<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrightNest Oracle</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0c0b1a; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .signal-card { background: #1a1a2e; padding: 20px; margin: 15px auto; border-radius: 12px; border: 1px solid #4e4e6a; max-width: 400px; }
        h1 { color: #4ecca3; }
    </style>
</head>
<body>
    <h1>إشارات التداول</h1>
    <div id="signals-container">جاري تحميل الإشارات...</div>

    <script>
        const supabase = supabase.createClient('https://bnfwhlvtxemldrcrhvhg.supabase.co', 'sb_publishable_vbbmxwqOzNif8GKsD3r6-Q_FfuNB3Ik');

        async function fetchSignals() {
            const container = document.getElementById('signals-container');
            const { data, error } = await supabase.from('signals').select('*');
            
            if (error) {
                container.innerHTML = "حدث خطأ أثناء تحميل البيانات.";
                return;
            }

            container.innerHTML = '';
            if (data && data.length > 0) {
                data.forEach(s => {
                    container.innerHTML += `
                        <div class="signal-card">
                            <h3>${s.asset}</h3>
                            <p>الاتجاه: ${s.direction}</p>
                            <p>نسبة الثقة: ${s.confidence}%</p>
                        </div>
                    `;
                });
            } else {
                container.innerHTML = "<p>لا توجد إشارات حالياً.</p>";
            }
        }
        fetchSignals();
    </script>
</body>
</html>
