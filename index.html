<script>
    const supabaseUrl = 'https://bnfwhlvtxemldrcrhvhg.supabase.co';
    const supabaseKey = 'sb_publishable_vbbmxwqOzNif8GKsD3r6-Q_FfuNB3Ik';
    const client = supabase.createClient(supabaseUrl, supabaseKey);

    async function fetchSignals() {
        const container = document.getElementById('signals-container');
        // جلب البيانات من جدول signals
        const { data, error } = await client.from('signals').select('*');
        
        if (error) {
            console.error("خطأ:", error);
            return;
        }

        container.innerHTML = ''; 
        if (data && data.length > 0) {
            data.forEach(signal => {
                container.innerHTML += `
                    <div class="signal-card">
                        <strong>${signal.asset || 'بدون اسم'}</strong><br>
                        الاتجاه: ${signal.direction || 'غير محدد'} | الثقة: ${signal.confidence || 0}%
                    </div>
                `;
            });
        } else {
            container.innerHTML = "<p>لا توجد إشارات حالياً في قاعدة البيانات.</p>";
        }
    }
    fetchSignals();
</script>
