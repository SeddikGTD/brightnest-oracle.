<!DOCTYPE html>
<html>
<head>

</head>
<body>
    <div id="status">جاري الاتصال...</div>
    <script>
        const supabase = supabase.createClient('https://bnfwhlvtxemldrcrhvhg.supabase.co', 'sb_publishable_vbbmxwqOzNif8GKsD3r6-Q_FfuNB3Ik');
        
        supabase.from('signals').select('*').then(({ data, error }) => {
            if (error) {
                document.getElementById('status').innerText = "خطأ: " + error.message;
            } else {
                document.getElementById('status').innerText = "تم الاتصال! عدد البيانات: " + data.length;
            }
        });
    </script>
</body>
</html>
