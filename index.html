<!DOCTYPE html>
<html>
<head>
    <title>منصة التداول</title>
    <!-- 1. نضع مكتبة Supabase هنا في الأعلى -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- هذا هو المربع الذي سيظهر فيه النتيجة -->
    <div id="chart-container">انتظر...</div>

    <!-- 2. نضع كود الاتصال الخاص بك هنا -->
    <script>
        const supabaseUrl = 'https://bnfwhlvtxemldrcrhvhg.supabase.co';
        const supabaseKey = 'sb_publishable_vbbmxwqOzNif8GKsD3r6-Q_FfUNB3Ik';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function checkConnection() {
            const container = document.getElementById('chart-container');
            container.innerText = "جاري الفحص...";
            
            try {
                const { data, error } = await supabase.from('signals').select('*');
                
                if (error) {
                    container.innerText = "خطأ الاتصال: " + error.message;
                } else {
                    container.innerText = "نجح الاتصال! عدد البيانات هو: " + data.length;
                }
            } catch (e) {
                container.innerText = "خطأ في الكود: " + e.message;
            }
        }
        
        checkConnection();
    </script>

</body>
</html>
