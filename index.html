<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BrightNest Oracle</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="status">جاري الاتصال بقاعدة البيانات...</div>

    <script>
        const supabaseUrl = 'https://bnfwhlvtxemldrcrhvhg.supabase.co'; 
        const supabaseKey = 'sb_publishable_vbbmxwqOzNif8GKsD3r6-Q_FfuNB3Ik';

        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function init() {
            const statusDiv = document.getElementById('status');
            try {
                const { data, error } = await supabase
                    .from('signals')
                    .select('*');
                
                if (error) {
                    statusDiv.innerHTML = "خطأ من قاعدة البيانات: " + error.message;
                    console.error(error);
                } else {
                    statusDiv.innerHTML = "نجح الاتصال! عدد السجلات المجلوبة: " + data.length;
                    console.log("البيانات:", data);
                }
            } catch (err) {
                statusDiv.innerHTML = "خطأ غير متوقع: " + err.message;
            }
        }

        init();
    </script>
</body>
</html>
