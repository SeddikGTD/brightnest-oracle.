<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BrightNest Oracle</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0c0b1a; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .signal-card { border: 1px solid #4e4e6a; padding: 15px; margin: 10px auto; border-radius: 10px; max-width: 350px; background: #1a1a2e; }
    </style>
</head>
<body>
    <h1>إشارات التداول</h1>
    <div id="signals-container">جاري فحص الاتصال...</div>

    <script>
        // إعداد العميل
        const supabaseUrl = 'https://bnfwhlvtxemldrcrhvhg.supabase.co';
        const supabaseKey = 'sb_publishable_vbbmxwqOzNif8GKsD3r6-Q_FfuNB3Ik';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function loadSignals() {
            const container = document.getElementById('signals-container');
            
            try {
                // جلب البيانات من جدول signals
                const { data, error } = await supabase
                    .from('signals')
                    .select('*'); // جلب جميع الأعمدة

                if (error) throw error;

                if (!data || data.length === 0) {
                    container.innerHTML = "قاعدة البيانات فارغة حالياً.";
                } else {
                    container.innerHTML = '';
                    data.forEach(s => {
                        container.innerHTML += `
                            <div class="signal-card">
                                <h3>الزوج: ${s.asset || 'غير محدد'}</h3>
                                <p>الاتجاه: ${s.direction || 'غير محدد'}</p>
                                <p>الثقة: ${s.confidence || 0}%</p>
                            </div>`;
                    });
                }
            } catch (err) {
                // هذا الجزء سيظهر الخطأ الحقيقي على الشاشة إذا وجد
                container.innerHTML = "خطأ في الاتصال: " + err.message;
            }
        }
        
        loadSignals();
    </script>
</body>
</html>
