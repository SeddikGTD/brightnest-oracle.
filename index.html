<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BrightNest Binary Trading</title>
    <!-- يمكنك إضافة رابط ملف CSS الخاص بك هنا -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>مرحباً بك في منصة التداول</h1>
    
    <!-- هذا هو المربع الذي ستظهر فيه البيانات -->
    <div id="chart-container">
        جاري تحميل البيانات...
    </div>

    <!-- استيراد مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // ضع الرابط والمفتاح الصحيحين هنا بدلاً من النصوص الموجودة
        const supabaseUrl =
          'https://bnfwhlvtxemldrcrhvhg.supabase.co';

        const supabaseKey = 'sb_publishable_vbbmxwqOzNif8GKsD3r6-Q_FfuNB3Ik';
        
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function updateUI() {
            try {
                const { data, error } = await supabase
                    .from('signals')
                    .select('*');
                
                if (error) {
                    document.getElementById('chart-container').innerText = 'خطأ: ' + error.message;
                } else {
                    // عرض البيانات داخل المربع
                    document.getElementById('chart-container').innerText = JSON.stringify(data, null, 2);
                }
            } catch (err) {
                console.error('فشل الاتصال:', err);
            }
        }

        // تشغيل الدالة عند تحميل الصفحة
        updateUI();
    </script>
</body>
</html>
