<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BrightNest Oracle</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>إشارات التداول</h1>
    <div id="signals-container">جاري التحميل...</div>

    <script>
        const supabase = supabase.createClient('https://bnfwhlvtxemldrcrhvhg.supabase.co', 'sb_publishable_vbbmxwqOzNif8GKsD3r6-Q_FfuNB3Ik');

        async function fetchSignals() {
            const container = document.getElementById('signals-container');
            const { data, error } = await supabase.from('signals').select('*');
            
            if (error) {
                container.innerHTML = "خطأ من قاعدة البيانات: " + error.message;
                return;
            }

            if (!data || data.length === 0) {
                container.innerHTML = "قاعدة البيانات فارغة حالياً (لا توجد إشارات).";
                return;
            }

            container.innerHTML = '';
            data.forEach(s => {
                // ملاحظة: تأكد أن هذه الأسماء هي نفسها الموجودة في Supabase
                container.innerHTML += `<div style="border:1px solid #4e4e6a; padding:10px; margin:10px;">
                    <h3>${s.asset || 'غير معروف'}</h3>
                    <p>الاتجاه: ${s.direction || 'غير معروف'}</p>
                    <p>الثقة: ${s.confidence || 0}%</p>
                </div>`;
            });
        }
        fetchSignals();
    </script>
</body>
</html>
