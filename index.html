<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>منصة التداول</title>
    <!-- تحميل مكتبة Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>

    <div id="chart-container" style="font-family: sans-serif; padding: 20px;">بدء التحميل...</div>

    <script>
        // إعدادات الاتصال المعتمدة
        const supabaseUrl = 'https://bnfwhlvtxemldrcrhvhg.supabase.co';
        const supabaseKey = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJuZndobHZ0eGVtbGRyY3JodmhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwODE4MjcsImV4cCI6MjA5ODY1NzgyN30.z59cojcXqDm4QLn-RapnquWYbFzsjbMVNTV4RAH1kfg';
        
        const container = document.getElementById('chart-container');
        
        if (typeof supabase === 'undefined') {
            container.innerText = "خطأ: لم يتم تحميل مكتبة Supabase.";
        } else {
            const client = supabase.createClient(supabaseUrl, supabaseKey);

            async function checkConnection() {
                container.innerText = "جاري الاتصال بقاعدة البيانات...";
                
                try {
                    // محاولة جلب البيانات من جدول signals
                    const { data, error } = await client.from('signals').select('*');
                    
                    if (error) {
                        container.innerText = "خطأ من قاعدة البيانات: " + error.message;
                    } else {
                        container.innerText = "نجح الاتصال! عدد البيانات هو: " + data.length;
                    }
                } catch (e) {
                    container.innerText = "خطأ غير متوقع: " + e.message;
                }
            }
            
            checkConnection();
        }
    </script>

</body>
</html>
