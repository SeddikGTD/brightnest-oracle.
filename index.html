<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SignalXpert Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #0c0b1a; color: #fff; padding: 10px; margin: 0; }
        h2 { text-align: center; color: #b794f4; margin-bottom: 20px; font-size: 1.2em; }
        
        .signal-card {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #333;
        }

        /* المربع الصغير على اليسار */
        .signal-box {
            width: 70px;
            height: 50px;
            border: 2px solid #ffd700;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
        }

        /* معلومات الزوج والسعر على اليمين */
        .info-box { text-align: left; }
        .symbol { font-weight: bold; font-size: 1.1em; }
        .details { font-size: 0.85em; color: #aaa; margin-top: 5px; }

        /* الألوان */
        .buy { border-color: #0f0; color: #0f0; }
        .sell { border-color: #f00; color: #f00; }
        .wait { border-color: #ffd700; color: #ffd700; }
    </style>
</head>
<body>
    <h2>Signals Live Dashboard</h2>
    <div id="container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const client = supabase.createClient('https://bnfwhlvtxemldrcrhvhg.supabase.co', 'sb_publishable_vbbmxwqOzNif8GKsD3r6-Q_FfuNB3Ik');

        async function loadSignals() {
            const { data, error } = await client.from('signals').select('*');
            if (error) return;

            const container = document.getElementById('container');
            container.innerHTML = "";
            
            data.forEach(item => {
                let asset = item.asset || 'N/A';
                let dir = item.direction || 'انتظار';
                let price = item.price || '0.00';
                let per = item.percentage || '0';

                let dirClass = dir === 'شراء' ? 'buy' : (dir === 'بيع' ? 'sell' : 'wait');
                
                container.innerHTML += `
                    <div class="signal-card">
                        <div class="signal-box ${dirClass}">
                            <span>${dir}</span>
                        </div>
                        <div class="info-box">
                            <div class="symbol">${asset}</div>
                            <div class="details">السعر: ${price} | النسبة: ${per}%</div>
                        </div>
                    </div>`;
            });
        }
        
        setInterval(loadSignals, 5000);
        loadSignals();
    </script>
</body>
</html>
