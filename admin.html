<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الإدارة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { padding: 20px; font-family: sans-serif; }
        input, button { display: block; width: 100%; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>إضافة إشارة جديدة</h2>
    <input id="asset" placeholder="الزوج (مثلاً EUR/USD)">
    <input id="direction" placeholder="الاتجاه (شراء/بيع)">
    <input id="confidence" type="number" placeholder="نسبة الثقة (0-100)">
    <button onclick="addSignal()">إرسال الإشارة</button>

    <script>
        const supabase = supabase.createClient('https://bnfwhlvtxemldrcrhvhg.supabase.co', 'sb_publishable_vbbmxwqOzNif8GKsD3r6-Q_FfuNB3Ik');

        async function addSignal() {
            const asset = document.getElementById('asset').value;
            const direction = document.getElementById('direction').value;
            const confidence = parseInt(document.getElementById('confidence').value);

            const { error } = await supabase.from('signals').insert([{ asset, direction, confidence }]);
            
            if (error) alert("خطأ: " + error.message);
            else alert("تمت إضافة الإشارة بنجاح!");
        }
    </script>
</body>
</html>
